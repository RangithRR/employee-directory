<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Directory</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Employee Directory</h1>
    </header>

    <div class="dashboard">

        <div class="stat-card">
            <h2 id="totalEmployees">0</h2>
            <p>Total Employees</p>
        </div>

        <div class="stat-card">
            <h2 id="totalDepartments">0</h2>
            <p>Departments</p>
        </div>

        <div class="stat-card">
            <h2 id="activeEmployees">0</h2>
            <p>Active Employees</p>
        </div>

    </div>

    <div class="form-container">

        <input type="text" id="empName" placeholder="Employee Name">

        <input type="text" id="empDept" placeholder="Department">

        <input type="email" id="empEmail" placeholder="Email">

        <button onclick="addEmployee()">
            Add / Update Employee
        </button>

    </div>

    <div class="search-box">

        <input type="text"
               id="searchInput"
               placeholder="Search Employee...">

    </div>

    <div id="employeeContainer"
         class="employee-container">
    </div>

    <footer>
        <h3>Developed by Rangith R R</h3>
        <p>AWS Cloud | Linux | Networking</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
